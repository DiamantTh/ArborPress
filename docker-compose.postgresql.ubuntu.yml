# ==============================================================================
# ArborPress – Docker Compose  (PostgreSQL 17, Ubuntu LTS)
#
# Blog-App-Image: python:3.12-slim-noble  (Ubuntu 24.04 LTS)
#   hub.docker.com/_/python  →  Tag: 3.12-slim-noble
#
# Datenbank-Image: postgres:17  (offiziell, Docker Hub)
#   hub.docker.com/_/postgres
#   PostgreSQL 17: Support bis November 2029
#   PostgreSQL 16: Support bis November 2028
#     → Auf älteren Stand wechseln: Image auf "postgres:16" ändern.
#
# !! WICHTIGER HINWEIS – KEIN OS-/DISTRO-WECHSEL IM BETRIEB !!
# ----------------------------------------------------------------
# Es existiert auch eine UBI9-Variante (docker-compose.postgresql.yml).
# Ein Wechsel des Basis-OS (UBI9 ↔ Ubuntu) auf einer laufenden Instanz
# wird AUSDRÜCKLICH NICHT empfohlen – aus folgenden Gründen:
#
# 1) APP-VOLUMES: Die Pfade unterscheiden sich zwischen den Varianten:
#      Ubuntu:  /app/media  /app/logs
#      UBI9:    /opt/app-root/src/media  /opt/app-root/src/logs
#    Eigentümer-UIDs weichen ebenfalls ab → Berechtigungsfehler möglich.
#
# 2) DATENBANKDATEN (kritisch!):
#    PostgreSQL-Datendateien (PGDATA) sind an die Kombination aus
#    PostgreSQL-Hauptversion UND dem compilierten System-libc/locale
#    des jeweiligen Container-Images gebunden.
#    Das bedeutet: Ein roher Volume-Kopiervorgang
#      UBI9/RHEL9-Container → Ubuntu-Container  (oder umgekehrt)
#    kann und wird häufig zu Datenbankkorruption oder Start-Fehlern
#    führen, selbst wenn die PostgreSQL-Version identisch ist.
#    Dies wurde nicht systematisch getestet – verlasse dich NICHT
#    auf einen Volume-Copy als Migrationspfad!
#
# 3) POSTGRESQL 17 – UPGRADE-VERBESSERUNGEN:
#    PG17 bietet verbesserte logische Replikation für Major-Version-
#    Upgrades (z. B. PG16 → PG17). Das ist eine Server-zu-Server-
#    Upgrade-Methode – sie löst KEINEN OS/Distro-Wechsel automatisch.
#
# SICHERER MIGRATIONSPFAD (immer, ohne Ausnahme):
#   pg_dump -Fc -U <user> <db>  →  pg_restore in den Ziel-Container
#   Niemals rohe PGDATA-Volumes zwischen unterschiedlichen
#   OS- oder Distro-Varianten kopieren.
#
# Verwendung:
#   cp .env.example .env          # Werte anpassen!
#   docker compose -f docker-compose.postgresql.ubuntu.yml up -d
#   docker compose -f docker-compose.postgresql.ubuntu.yml logs -f app
#
# Voraussetzungen:
#   - .env mit ARBORPRESS_WEB__SECRET_KEY, DB_PASSWORD, DB_ADMIN_PASSWORD
#   - Docker Compose v2 (docker compose, nicht docker-compose)
# ==============================================================================

services:

  # ── PostgreSQL 17 (offiziell, Docker Hub) ────────────────────────────────
  #    Auf PostgreSQL 16 wechseln: Image auf "postgres:16" ändern
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER:     "${DB_USER:-arborpress}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:?DB_PASSWORD muss in .env gesetzt sein}"
      POSTGRES_DB:       "${DB_NAME:-arborpress}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout:  5s
      retries:  6
      start_period: 30s
    expose:
      - "5432"

  # ── ArborPress (Ubuntu 24.04 LTS, Python 3.12) ────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.postgresql.ubuntu
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # ── Datenbank ──────────────────────────────────────────────────────────
      ARBORPRESS_DB__URL: >-
        postgresql+asyncpg://${DB_USER:-arborpress}:${DB_PASSWORD}@db/${DB_NAME:-arborpress}
      # ── Web / Sicherheit ───────────────────────────────────────────────────
      ARBORPRESS_WEB__SECRET_KEY:      "${ARBORPRESS_WEB__SECRET_KEY:?SECRET_KEY muss in .env gesetzt sein}"
      ARBORPRESS_WEB__BASE_URL:        "${ARBORPRESS_WEB__BASE_URL:-http://localhost:8080}"
      ARBORPRESS_WEB__TRUSTED_PROXIES: "${ARBORPRESS_WEB__TRUSTED_PROXIES:-1}"
      # ── Logging ────────────────────────────────────────────────────────────
      ARBORPRESS_LOGGING__LEVEL:       "${ARBORPRESS_LOGGING__LEVEL:-INFO}"
      # ── Worker-Anzahl ──────────────────────────────────────────────────────
      ARBORPRESS_WORKERS:              "${ARBORPRESS_WORKERS:-2}"
    volumes:
      # Achtung: andere Volume-Pfade als in der UBI9-Variante!
      - arborpress-media:/app/media
      - arborpress-logs:/app/logs
    networks:
      - internal
      - external
    ports:
      - "${APP_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL",
             "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/_health')\""]
      interval: 30s
      timeout:  5s
      retries:  3
      start_period: 30s

# ── Netzwerke ────────────────────────────────────────────────────────────────
networks:
  internal:
    internal: true
  external: {}

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres-data:
    driver: local
  arborpress-media:
    driver: local
  arborpress-logs:
    driver: local
