# ======================================================================
# ArborPress – Docker Compose  (Ubuntu 24.04 LTS + PostgreSQL 17)
# ======================================================================
#
# Genutzte Images:
#   App:  python:3.12-slim-noble  (Ubuntu 24.04 LTS "Noble Numbat")
#   DB:   postgres:17             (offizielles PostgreSQL-Image)
#         Alternativ:  postgres:16  (falls SQL-Kompatibilität mit PG 16 benötigt)
#
# Starten:    docker compose -f docker-compose.postgresql.ubuntu.yml up -d
# Stoppen:    docker compose -f docker-compose.postgresql.ubuntu.yml down
# Mit Daten:  docker compose -f docker-compose.postgresql.ubuntu.yml down -v
#
# !! WICHTIGER HINWEIS – KEIN OS-WECHSEL IM BETRIEB !!
# -------------------------------------------------------
# Es existiert auch eine UBI9-Variante (docker-compose.postgresql.yml).
# Ein Wechsel zwischen Ubuntu und UBI9 auf einer laufenden Instanz
# wird AUSDRÜCKLICH NICHT empfohlen:
#
# 1) APP-VOLUMES: Pfade und UIDs unterscheiden sich:
#      Ubuntu:  /app/media  /app/logs                            (UID/GID 1001)
#      UBI9:    /opt/app-root/src/media  /opt/app-root/src/logs  (UID 1001/GID 0)
#
# 2) POSTGRESQL PGDATA (kritisch!):
#    PostgreSQL-PGDATA ist an die libc/locale des Container-Images gebunden.
#    Ein roher Volume-Copy zwischen Ubuntu (glibc Noble) und UBI9 (glibc RHEL9)
#    führt zu Datenbankkorruption – auch bei identischer PostgreSQL-Version.
#    Nicht getestet; verlasse dich NICHT darauf.
#
# SICHERER MIGRATIONSPFAD (immer, ohne Ausnahme):
#   pg_dump -Fc  →  pg_restore
# ======================================================================

name: arborpress-postgresql-ubuntu

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.ubuntu
    image: arborpress:ubuntu
    restart: unless-stopped
    env_file: .env
    environment:
      ARBORPRESS_DB__URL: "postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}"
      DB_HOST: db
      DB_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${ARBORPRESS_PORT:-8080}:8080"
    volumes:
      - app_media:/app/media
      - app_logs:/app/logs
      # Konfiguration einbinden (Verzeichnis oder Einzeldatei):
      # - ./config:/app/config:ro
      # - ./config.toml:/app/config.toml:ro
    healthcheck:
      test:
        - "CMD"
        - "python3"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/_health')"
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  db:
    # Alternativ: postgres:16
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 5

volumes:
  app_media:
  app_logs:
  pg_data:
