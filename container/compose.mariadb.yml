# ======================================================================
# ArborPress – Docker Compose  (UBI9 + MariaDB 10.11 RHEL9)
# ======================================================================
#
# Genutzte Images:
#   App:  registry.access.redhat.com/ubi9/python-312   (kostenlos, kein Abo)
#   DB:   registry.access.redhat.com/rhel9/mariadb-1011
#
# Starten:    docker compose -f container/compose.mariadb.yml up -d
# Stoppen:    docker compose -f container/compose.mariadb.yml down
# Mit Daten:  docker compose -f container/compose.mariadb.yml down -v
#
# !! WICHTIGER HINWEIS – KEIN OS-WECHSEL IM BETRIEB !!
# -------------------------------------------------------
# Es existiert auch eine Ubuntu-Variante (compose.mariadb.ubuntu.yml).
# Ein Wechsel zwischen UBI9 und Ubuntu auf einer laufenden Instanz
# wird AUSDRÜCKLICH NICHT empfohlen:
#
# 1) APP-VOLUMES: Pfade und UIDs unterscheiden sich:
#      UBI9:    /opt/app-root/src/media  /opt/app-root/src/logs  (UID 1001/GID 0)
#      Ubuntu:  /app/media  /app/logs                            (UID/GID 1001)
#
# 2) MARIADB INNODB (kritisch!):
#    InnoDB-Tablespaces und Systemtabellen sind an die libc des jeweiligen
#    Container-Images gebunden. Ein roher Volume-Copy zwischen UBI9 (glibc
#    RHEL9) und Ubuntu (glibc Noble) führt zu Datenbankkorruption – auch bei
#    identischer MariaDB-Version.
#    Nicht getestet; verlasse dich NICHT darauf.
#
# SICHERER MIGRATIONSPFAD (immer, ohne Ausnahme):
#   mysqldump --single-transaction  →  mysql import
# ======================================================================

name: arborpress-mariadb

services:
  app:
    build:
      context: ..
      dockerfile: container/Containerfile.ubi9
    image: arborpress:ubi9
    restart: unless-stopped
    env_file: ../.env
    environment:
      ARBORPRESS_DB__URL: "mysql+aiomysql://${MARIADB_USER}:${MARIADB_PASSWORD}@db:3306/${MARIADB_DATABASE}"
      DB_HOST: db
      DB_PORT: "3306"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${ARBORPRESS_PORT:-8080}:8080"
    volumes:
      - app_media:/opt/app-root/src/media
      - app_logs:/opt/app-root/src/logs
      # Konfiguration einbinden (Verzeichnis oder Einzeldatei):
      # - ../config:/opt/app-root/src/config:ro
    healthcheck:
      test:
        - "CMD"
        - "python3"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/_health')"
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  db:
    image: registry.access.redhat.com/rhel9/mariadb-1011:latest
    restart: unless-stopped
    environment:
      MYSQL_USER: "${MARIADB_USER}"
      MYSQL_PASSWORD: "${MARIADB_PASSWORD}"
      MYSQL_DATABASE: "${MARIADB_DATABASE}"
      MYSQL_ROOT_PASSWORD: "${MARIADB_ROOT_PASSWORD}"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5

volumes:
  app_media:
  app_logs:
  mariadb_data:
