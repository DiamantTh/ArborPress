# =============================================================================
#  ArborPress – Apache2 Reverse-Proxy-Konfiguration
#  Gilt für: Apache 2.4  |  Shared Hosting / VPS / Dedicated
# =============================================================================
#
#  Diese Datei besteht ausschließlich aus <VirtualHost>-Blöcken und ist damit
#  kompatibel mit Shared-Hosting-Panels (cPanel, Plesk, ISPConfig, Froxlor,
#  DirectAdmin), die nur Vhost-Includes erlauben.
#
#  Voraussetzungen
#  ---------------
#  Die folgenden Module müssen aktiv sein. Auf eigenem Server:
#
#    sudo a2enmod proxy proxy_http ssl headers rewrite
#    sudo a2ensite arborpress.conf
#    sudo apache2ctl configtest && sudo systemctl reload apache2
#
#  Auf Shared Hosting sind diese Module üblicherweise bereits aktiv.
#  mod_remoteip ist optional; ohne es liest ArborPress X-Forwarded-For
#  direkt aus dem Request-Header (funktioniert, solange [web] trusted_proxies
#  korrekt gesetzt ist).
#
#  Ablage
#  ------
#  Shared Hosting: Dateiname und Pfad vom Panel vorgegeben
#  Eigener Server: /etc/apache2/sites-available/arborpress.conf
#
#  TLS-Hinweis
#  -----------
#  SSLProtocol / SSLCipherSuite dürfen pro VirtualHost gesetzt werden.
#  Auf Shared Hosting setzen diese oft global der Provider – dann weglassen.
#
#  Rate-Limiting-Hinweis
#  ---------------------
#  mod_ratelimit begrenzt Bandbreite, nicht Request-Rate. Für echtes
#  Brute-Force-Schutz empfiehlt sich fail2ban (greift auf Zugriffslog-Ebene)
#  oder das ArborPress-interne Limit (config.toml → [auth]
#  auth_rate_limit = "10/minute").
#
# =============================================================================


# ---------------------------------------------------------------------------
#  1) HTTP  → HTTPS Redirect
# ---------------------------------------------------------------------------

<VirtualHost *:80>
    ServerName blog.example.com

    # Let's Encrypt ACME-Challenge muss über HTTP erreichbar bleiben.
    # Pfad ggf. anpassen oder vom Panel automatisch gesetzt lassen.
    Alias /.well-known/acme-challenge/ /var/www/certbot/.well-known/acme-challenge/
    <Directory /var/www/certbot/.well-known/acme-challenge/>
        Options None
        AllowOverride None
        Require all granted
    </Directory>

    # Alle anderen Anfragen dauerhaft auf HTTPS umleiten.
    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>


# ---------------------------------------------------------------------------
#  2) HTTPS  → ArborPress
# ---------------------------------------------------------------------------

<VirtualHost *:443>
    ServerName blog.example.com

    # --- TLS-Zertifikate -----------------------------------------------------
    # Certbot-Standardpfade; nach "certbot --apache" automatisch eingetragen.
    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/blog.example.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/blog.example.com/privkey.pem

    # TLS-Protokolle und Cipher-Einstellungen (Mozilla Modern Config, 2024).
    # Auf Shared Hosting: weglassen wenn der Provider diese global setzt.
    SSLProtocol         all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite      ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305
    SSLHonorCipherOrder off
    SSLSessionTickets   off

    # --- Proxy-Einstellungen -------------------------------------------------
    # ArborPress läuft als ASGI-Prozess auf localhost:5000 (Hypercorn).
    ProxyPreserveHost On
    ProxyPass        /static/ !              # statische Dateien → Apache direkt
    ProxyPass        / http://127.0.0.1:5000/
    ProxyPassReverse / http://127.0.0.1:5000/

    # Timeout: bei langsamen DB-Queries ggf. erhöhen.
    ProxyTimeout 60

    # IP-Weiterleitung an ArborPress.
    # config.toml muss passend gesetzt sein: [web] trusted_proxies = 1
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-For   "%{REMOTE_ADDR}e"

    # --- Sicherheits-Header --------------------------------------------------
    # HSTS: Nur im HTTPS-VirtualHost setzen (niemals im HTTP-Block oben).
    # 2 Jahre = 63.072.000 Sekunden. "preload" erst aktivieren wenn die
    # Domain auf hstspreload.org eingetragen werden soll.
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"

    # CSP, X-Frame-Options, X-Content-Type-Options usw. setzt ArborPress
    # selbst. "always" sorgt dafür, dass HSTS auch bei Fehlerantworten
    # mitgesendet wird.

    # --- Statische Dateien direkt von Apache bedienen ------------------------
    # /path/to/arborpress/static/ → absoluten Pfad zur static/-Directory ersetzen.
    Alias /static/ /path/to/arborpress/static/
    <Directory /path/to/arborpress/static/>
        Options -Indexes
        AllowOverride None
        Require all granted

        # Langzeit-Caching; ArborPress verwendet Cache-Busting via Dateinamen.
        <IfModule mod_expires.c>
            ExpiresActive On
            ExpiresDefault "access plus 1 year"
        </IfModule>
        Header always set Cache-Control "public, max-age=31536000, immutable"
        Header always set X-Content-Type-Options "nosniff"
    </Directory>

    # --- Client-Limits -------------------------------------------------------
    # Muss mit config.toml → [web] max_upload_size übereinstimmen (Standard 50 MB).
    LimitRequestBody 52428800

    # --- Zugriffslog ---------------------------------------------------------
    # Auf Shared Hosting: Pfad vom Panel vorgegeben; diese Zeilen ggf. weglassen.
    CustomLog /var/log/apache2/arborpress.access.log combined
    ErrorLog  /var/log/apache2/arborpress.error.log
</VirtualHost>
