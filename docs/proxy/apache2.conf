# =============================================================================
#  ArborPress – Apache2 Reverse-Proxy-Konfiguration
#  Gilt für: Apache 2.4 (Ubuntu 22.04 / Debian 12)
# =============================================================================
#
#  Voraussetzungen  (sudo a2enmod …)
#  ----------------------------------
#  - proxy                 Reverse-Proxy-Basismodul
#  - proxy_http            HTTP/1.1-Proxy-Unterstützung
#  - ssl                   HTTPS-Terminierung
#  - headers               Sicherheits-Header setzen
#  - rewrite               HTTP → HTTPS Redirect
#  - remoteip              X-Forwarded-For korrekt auswerten
#  - ratelimit             (optional) Einfaches Rate-Limiting
#
#  Aktivierung:
#    sudo a2enmod proxy proxy_http ssl headers rewrite remoteip
#    sudo a2ensite arborpress.conf
#    sudo apache2ctl configtest && sudo systemctl reload apache2
#
#  Einzufügende Abschnitte
#  -----------------------
#    1. VirtualHost :80  → HTTPS-Redirect
#    2. VirtualHost :443 → ArborPress
#
# =============================================================================

# ---------------------------------------------------------------------------
#  1) HTTP  → HTTPS Redirect
# ---------------------------------------------------------------------------

<VirtualHost *:80>
    ServerName blog.example.com

    # Let's Encrypt-Challenge direkt von Apache bedienen
    Alias /.well-known/acme-challenge/ /var/www/certbot/.well-known/acme-challenge/
    <Directory /var/www/certbot/.well-known/acme-challenge/>
        Options None
        AllowOverride None
        Require all granted
    </Directory>

    # Alle anderen Anfragen → HTTPS (301 Permanent)
    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>

# ---------------------------------------------------------------------------
#  2) HTTPS  → ArborPress
# ---------------------------------------------------------------------------

<VirtualHost *:443>
    ServerName blog.example.com

    # --- SSL-Konfiguration ---------------------------------------------------
    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/blog.example.com/cert.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/blog.example.com/privkey.pem
    SSLCertificateChainFile /etc/letsencrypt/live/blog.example.com/chain.pem

    # Empfohlene TLS-Mindesteinstellungen (Mozilla Modern Config, Stand 2024)
    SSLProtocol             all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305
    SSLHonorCipherOrder     off
    SSLSessionTickets       off

    # --- Proxy-Einstellungen -------------------------------------------------
    # ArborPress auf localhost:5000 (ASGI via Hypercorn)
    ProxyPreserveHost On
    ProxyPass        /static/ !                     # statische Dateien → Apache direkt
    ProxyPass        / http://127.0.0.1:5000/
    ProxyPassReverse / http://127.0.0.1:5000/

    # IP-Weiterleitung: ArborPress liest X-Forwarded-For aus.
    # config.toml: [web] trusted_proxies = 1
    RemoteIPHeader X-Forwarded-For
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-For   %{REMOTE_ADDR}e

    # Timeouts (anpassen falls DB-Queries länger dauern)
    ProxyTimeout 60

    # --- Sicherheits-Header --------------------------------------------------
    # HSTS: nur vom HTTPS-VirtualHost setzen; nie im HTTP-VirtualHost.
    # 2 Jahre = 63.072.000 Sekunden; preload optional (HSTS-Preload-Liste)
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"

    # ArborPress setzt X-Content-Type-Options, X-Frame-Options, CSP etc. selbst.
    # "always" stellt sicher, dass der Header auch bei Fehlerantworten gesetzt wird.
    # Sind diese Header bereits von ArborPress gesetzt, werden sie NICHT doppelt gesendet
    # (Apache2-Verhalten: erste Deklaration gewinnt wenn kein "always merge" verwendet wird).

    # --- Statische Dateien direkt bedienen -----------------------------------
    # Höhere Performance: Apache liest Dateien direkt vom Dateisystem.
    Alias /static/ /path/to/arborpress/static/
    <Directory /path/to/arborpress/static/>
        Options -Indexes
        AllowOverride None
        Require all granted

        # Langzeit-Caching für statische Assets (ArborPress versioniert via Cache-Busting)
        <IfModule mod_expires.c>
            ExpiresActive On
            ExpiresDefault "access plus 1 year"
        </IfModule>
        Header always set Cache-Control "public, max-age=31536000, immutable"
        Header always set X-Content-Type-Options "nosniff"
    </Directory>

    # --- Zugriffslog ---------------------------------------------------------
    LogFormat "%h %l %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\"" combined
    CustomLog /var/log/apache2/arborpress.access.log combined
    ErrorLog  /var/log/apache2/arborpress.error.log

    # --- Client-Limits -------------------------------------------------------
    LimitRequestBody 52428800   # 50 MB; muss mit config.toml übereinstimmen
</VirtualHost>

# ---------------------------------------------------------------------------
#  Optionales Rate-Limiting via mod_ratelimit
#  (weniger flexibel als nginx; für Brute-Force-Schutz eher fail2ban empfohlen)
# ---------------------------------------------------------------------------
#
# <Location /auth/>
#     SetOutputFilter RATE_LIMIT
#     SetEnv rate-limit 400   # KB/s – begrenzt Download, nicht Request-Rate
# </Location>
#
# Empfehlung: fail2ban mit Apache2-Log-Filter nutzen für echtes Rate-Limiting.
