# =============================================================================
#  ArborPress – nginx Reverse-Proxy-Konfiguration
#  Gilt für: nginx ≥ 1.18 (Ubuntu 22.04 / Debian 12 Packages)
# =============================================================================
#
#  Voraussetzungen
#  ---------------
#  - ArborPress läuft als ASGI-Prozess auf 127.0.0.1:5000
#    (Standard; anpassbar via config.toml → [web] host/port)
#  - SSL-Zertifikat liegt vor (Let's Encrypt / Certbot o.ä.)
#  - nginx-Module: ngx_http_proxy_module, ngx_http_ssl_module,
#    ngx_http_headers_module, ngx_http_limit_req_module
#
#  Einzufügende Abschnitte
#  -----------------------
#    1. http-Block  → rate_limit-Zone, proxy_cache-Zone (ggf. global in nginx.conf)
#    2. server-Block (HTTP → HTTPS-Redirect)
#    3. server-Block (HTTPS → ArborPress)
#
# =============================================================================

# ---------------------------------------------------------------------------
#  1) Im http-Block (z.B. /etc/nginx/nginx.conf oder conf.d/arborpress.conf)
# ---------------------------------------------------------------------------

# Rate-Limit-Zone: 10 Requests/Sekunde pro IP (Schutz vor Brute-Force / DDoS)
# $binary_remote_addr spart ~50 % RAM gegenüber $remote_addr
limit_req_zone $binary_remote_addr zone=arborpress_login:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=arborpress_global:20m rate=60r/s;

# Optionaler Medien-Cache (statische Assets, Thumbnails)
# Benötigt nginx mit ngx_http_proxy_module
proxy_cache_path /var/cache/nginx/arborpress
    levels=1:2
    keys_zone=arborpress_media:10m
    max_size=1g
    inactive=48h
    use_temp_path=off;

# ---------------------------------------------------------------------------
#  2) HTTP  → HTTPS Redirect
# ---------------------------------------------------------------------------

server {
    listen 80;
    listen [::]:80;
    server_name blog.example.com;

    # Let's Encrypt Challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Alle anderen Requests → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
#  3) HTTPS  → ArborPress
# ---------------------------------------------------------------------------

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name blog.example.com;

    # --- Zertifikate (Certbot-Pfade anpassen) --------------------------------
    ssl_certificate     /etc/letsencrypt/live/blog.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/blog.example.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;  # empfohlene TLS-Einstellungen
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # --- Sicherheits-Header --------------------------------------------------
    # HSTS: Browser soll die Domain 2 Jahre lang nur per HTTPS aufrufen.
    # Erst setzen wenn HTTPS stabil läuft; preload benötigt Eintrag im HSTS-Preload-Verzeichnis.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ArborPress setzt diese Header selbst; nginx gibt sie unverändert weiter.
    # Nur HSTS kommt zusätzlich vom Proxy, da er HTTPS terminiert.

    # --- Zugriffslog (optional: Datenschutz → IP anonymisieren) --------------
    access_log /var/log/nginx/arborpress.access.log;
    error_log  /var/log/nginx/arborpress.error.log warn;

    # --- Client-Limits -------------------------------------------------------
    client_max_body_size 50m;   # Medien-Upload; muss mit config.toml übereinstimmen
    keepalive_timeout    65;

    # --- Upstream-Proxy-Einstellungen ----------------------------------------
    # Diese Header werden an ArborPress weitergeleitet.
    # config.toml: [web] trusted_proxies = 1
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;

    # Timeouts: ArborPress ist async, kann aber bei langsamen DB-Queries länger brauchen
    proxy_connect_timeout 30s;
    proxy_read_timeout    60s;
    proxy_send_timeout    60s;

    # Puffer: verhindert "upstream sent invalid header" bei großen Responses
    proxy_buffering     on;
    proxy_buffer_size   16k;
    proxy_buffers       8 16k;
    proxy_busy_buffers_size 32k;

    # --- Statische Dateien ---------------------------------------------------
    # Direkt von nginx bedienen; umgeht Quart für Performance-kritische Assets.
    location /static/ {
        alias /path/to/arborpress/static/;   # absoluter Pfad zur static/-Directory

        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options nosniff;

        # Kein Logging für statische Dateien (reduziert Log-Volumen)
        access_log off;
    }

    # --- Medien-Upload-Verzeichnis (falls file-system storage) ---------------
    # Nur einbinden wenn uploads lokal gespeichert werden (kein S3/Object-Storage):
    # location /media/ {
    #     alias /path/to/arborpress/uploads/;
    #
    #     # Medien cachen (vgl. Mastodon-Ansatz für User-Content)
    #     proxy_cache          arborpress_media;
    #     proxy_cache_valid    200 48h;
    #     proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    #     add_header X-Cache-Status $upstream_cache_status;
    #
    #     expires 1y;
    #     add_header Cache-Control "public, max-age=31536000";
    #     add_header X-Content-Type-Options nosniff;
    #
    #     # CORS für oEmbed / externe Einbettung
    #     add_header Access-Control-Allow-Origin "*";
    #     add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
    # }

    # --- Rate-Limiting für Login-Endpunkte -----------------------------------
    # Greift VOR dem Proxy-Pass; verhindert Brute-Force-Angriffe.
    location ~ ^/auth/(login|register|stepup) {
        limit_req zone=arborpress_login burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:5000;
    }

    # --- ActivityPub / Federation --------------------------------------------
    # ActivityPub nutzt HTTP-Signaturen; keine zusätzliche Rate-Begrenzung nötig.
    location ~ ^/(\.well-known/webfinger|\.well-known/nodeinfo|users/|inbox|outbox) {
        proxy_pass http://127.0.0.1:5000;

        # Exakte Content-Type-Weiterleitung; manche Clients sind empfindlich
        proxy_pass_header Content-Type;
    }

    # --- Standard-Requests ---------------------------------------------------
    location / {
        limit_req zone=arborpress_global burst=20 nodelay;

        proxy_pass http://127.0.0.1:5000;
    }

    # --- ACME-Challenge (falls nicht in separatem HTTP-Vhost) ----------------
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}
