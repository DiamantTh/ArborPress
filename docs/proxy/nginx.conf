# =============================================================================
#  ArborPress – nginx Reverse-Proxy-Konfiguration
#  Gilt für: nginx ≥ 1.18  |  Shared Hosting / VPS / Dedicated
# =============================================================================
#
#  Diese Datei besteht ausschließlich aus server{}-Blöcken und ist damit
#  kompatibel mit Shared-Hosting-Panels (cPanel, Plesk, ISPConfig, Froxlor),
#  die nur Vhost-Includes erlauben, aber keinen Zugriff auf den http{}-Block.
#
#  Voraussetzungen
#  ---------------
#  - ArborPress läuft als ASGI-Prozess auf 127.0.0.1:5000
#    (anpassbar: config.toml → [web] host / port)
#  - SSL-Zertifikat liegt vor (Let's Encrypt / Certbot o.ä.)
#  - nginx-Module: ngx_http_proxy_module, ngx_http_ssl_module,
#    ngx_http_headers_module
#
#  Ablage
#  ------
#  Shared Hosting (Panel-Include): Dateiname und Pfad vom Panel vorgegeben
#  Eigener Server (Debian/Ubuntu): /etc/nginx/sites-available/arborpress
#      → ln -s /etc/nginx/sites-available/arborpress /etc/nginx/sites-enabled/
#      → sudo nginx -t && sudo systemctl reload nginx
#
#  Rate-Limiting-Hinweis
#  ---------------------
#  limit_req_zone ist eine http{}-Direktive und kann auf Shared Hosting
#  nicht pro Vhost gesetzt werden. Alternativen:
#    a) Hosting-Provider beauftragen, Zonen global einzurichten
#    b) ArborPress-eigenes Rate-Limiting nutzen (config.toml → [auth]
#       auth_rate_limit = "10/minute") – greift auf Applikationsebene
#    c) Auf eigenem Server: Zonen in /etc/nginx/conf.d/limits.conf ablegen
#       (Beispiel am Ende dieser Datei als Kommentar)
#
# =============================================================================


# ---------------------------------------------------------------------------
#  1) HTTP  → HTTPS Redirect
# ---------------------------------------------------------------------------

server {
    listen 80;
    listen [::]:80;
    server_name blog.example.com;

    # Let's Encrypt ACME-Challenge – muss über HTTP erreichbar bleiben
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;  # Pfad ggf. anpassen
    }

    # Alle anderen Requests dauerhaft auf HTTPS umleiten
    location / {
        return 301 https://$host$request_uri;
    }
}


# ---------------------------------------------------------------------------
#  2) HTTPS  → ArborPress
# ---------------------------------------------------------------------------

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name blog.example.com;

    # --- TLS-Zertifikate -----------------------------------------------------
    # Certbot-Standardpfade; nach "certbot --nginx" automatisch eingetragen.
    ssl_certificate     /etc/letsencrypt/live/blog.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/blog.example.com/privkey.pem;

    # Certbot generiert diese Datei automatisch (TLS 1.2+, sichere Ciphers).
    # Auf Shared Hosting: Pfad vom Panel vorgegeben oder weglassen wenn
    # der Provider TLS-Parameter global setzt.
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # --- Sicherheits-Header --------------------------------------------------
    # HSTS: Nur vom HTTPS-Server setzen (nie im HTTP-Block oben).
    # 2 Jahre = 63.072.000 s. "preload" nur aktivieren wenn die Domain im
    # HSTS-Preload-Verzeichnis (hstspreload.org) eingetragen werden soll.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Die übrigen Sicherheits-Header (CSP, X-Frame-Options, …) setzt
    # ArborPress selbst via SecurityHeadersMiddleware. nginx leitet sie
    # unverändert weiter – kein Duplikat nötig.

    # --- Logs ----------------------------------------------------------------
    # Auf Shared Hosting: Pfad vom Hosting-Panel vorgegeben.
    access_log /var/log/nginx/arborpress.access.log;
    error_log  /var/log/nginx/arborpress.error.log warn;

    # --- Client-Limits -------------------------------------------------------
    # Muss mit config.toml → [web] max_upload_size übereinstimmen (Standard 50 MB).
    client_max_body_size 50m;
    keepalive_timeout    65;

    # --- Proxy-Header --------------------------------------------------------
    # Werden an ArborPress weitergegeben.
    # config.toml muss passend gesetzt sein: [web] trusted_proxies = 1
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;

    # --- Proxy-Timeouts ------------------------------------------------------
    proxy_connect_timeout 30s;
    proxy_read_timeout    60s;
    proxy_send_timeout    60s;

    # --- Proxy-Puffer --------------------------------------------------------
    # Verhindert "upstream sent invalid header" bei großen Responses.
    proxy_buffering         on;
    proxy_buffer_size       16k;
    proxy_buffers           8 16k;
    proxy_busy_buffers_size 32k;

    # --- Statische Dateien direkt von nginx bedienen -------------------------
    # Umgeht Quart vollständig; deutlich schneller für CSS/JS/Bilder.
    # /path/to/arborpress/static/ → absoluter Pfad zur static/-Directory ersetzen.
    location /static/ {
        alias /path/to/arborpress/static/;

        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options nosniff;
        access_log off;  # kein Logging für Assets (reduziert Log-Volumen)
    }

    # --- Medien-Verzeichnis (nur bei lokalem Dateisystem-Storage) ------------
    # Auskommentiert; aktivieren wenn uploads lokal und kein Object-Storage.
    # /path/to/arborpress/uploads/ anpassen.
    #
    # location /media/ {
    #     alias /path/to/arborpress/uploads/;
    #
    #     expires 1y;
    #     add_header Cache-Control "public, max-age=31536000";
    #     add_header X-Content-Type-Options nosniff;
    #
    #     # CORS: benötigt für oEmbed-Einbettung durch externe Seiten
    #     add_header Access-Control-Allow-Origin  "*";
    #     add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
    # }

    # --- ActivityPub / Federation --------------------------------------------
    # Exaktes Content-Type-Forwarding nötig; manche AP-Clients sind empfindlich.
    location ~ ^/(\.(well-known)/|ap/|inbox|outbox) {
        proxy_pass       http://127.0.0.1:5000;
        proxy_pass_header Content-Type;
    }

    # --- Auth-Endpunkte (Rate-Limiting falls Zonen verfügbar) ----------------
    # Wenn der Hoster limit_req_zone unterstützt, hier limit_req einsetzen:
    #
    # location ~ ^/auth/(login|register|stepup) {
    #     limit_req        zone=arborpress_login burst=5 nodelay;
    #     limit_req_status 429;
    #     proxy_pass       http://127.0.0.1:5000;
    # }
    #
    # Ohne http{}-Zugriff: ArborPress-internes Limit greift
    # (config.toml → [auth] auth_rate_limit = "10/minute").

    # --- Alle anderen Requests -----------------------------------------------
    location / {
        proxy_pass http://127.0.0.1:5000;
    }
}


# =============================================================================
#  Eigener Server: optionale Rate-Limit-Zonen
#  → In eine separate Datei auslagern, z. B.: /etc/nginx/conf.d/limits.conf
#  → Wird im http{}-Block eingebunden; NICHT in diese Datei kopieren.
# =============================================================================
#
# limit_req_zone $binary_remote_addr zone=arborpress_login:10m  rate=10r/m;
# limit_req_zone $binary_remote_addr zone=arborpress_global:20m rate=60r/s;
#
# Danach in den location-Blöcken oben einkommentieren:
#   limit_req zone=arborpress_login  burst=5  nodelay;
#   limit_req zone=arborpress_global burst=20 nodelay;
