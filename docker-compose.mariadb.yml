# ==============================================================================
# ArborPress – Docker Compose  (MariaDB 10.11 / UBI9)
#
# Datenbank-Image: registry.access.redhat.com/rhel9/mariadb-1011
#   Red Hat Application Stream Container, UBI9-Basis, kostenlos nutzbar.
#   catalog.redhat.com → rhel9/mariadb-1011
#
# !! WICHTIGER HINWEIS – KEIN OS-/DISTRO-WECHSEL IM BETRIEB !!
# ----------------------------------------------------------------
# Es existiert auch eine Ubuntu-Variante (docker-compose.mariadb.ubuntu.yml).
# Ein Wechsel des Basis-OS auf einer laufenden Instanz wird AUSDRÜCKLICH
# NICHT empfohlen:
#
# 1) APP-VOLUMES: Pfade und UIDs unterscheiden sich zwischen Varianten.
#      UBI9:    /opt/app-root/src/media  /opt/app-root/src/logs
#      Ubuntu:  /app/media  /app/logs
#
# 2) DATENBANKDATEN (kritisch!):
#    MariaDB InnoDB-Tablespace-Dateien sind an die libc-Version des
#    Container-Images gebunden.  Ein roher Volume-Kopiervorgang zwischen
#    UBI9- und Ubuntu-Containern kann zu Tabellenkorruption oder
#    Start-Fehlern führen, auch bei identischer MariaDB-Version.
#    Nicht getestet!
#
# SICHERER MIGRATIONSPFAD (immer, ohne Ausnahme):
#   mysqldump --single-transaction -u root -p <db>  →  mysql import
#
# Verwendung:
#   cp .env.example .env          # Werte anpassen!
#   docker compose -f docker-compose.mariadb.yml up -d
#   docker compose -f docker-compose.mariadb.yml logs -f app
#
# Voraussetzungen:
#   - .env mit ARBORPRESS_WEB__SECRET_KEY, DB_PASSWORD, DB_ROOT_PASSWORD
#   - Docker Compose v2 (docker compose, nicht docker-compose)
# ==============================================================================

services:

  # ── MariaDB 10.11 (Red Hat UBI9) ─────────────────────────────────────────
  db:
    image: registry.access.redhat.com/rhel9/mariadb-1011:latest
    restart: unless-stopped
    environment:
      # Anwendungs-Benutzer (nicht root)
      MYSQL_USER:          "${DB_USER:-arborpress}"
      MYSQL_PASSWORD:      "${DB_PASSWORD:?DB_PASSWORD muss in .env gesetzt sein}"
      MYSQL_DATABASE:      "${DB_NAME:-arborpress}"
      # Root-Passwort (für Admin-Aufgaben)
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD muss in .env gesetzt sein}"
    volumes:
      - mariadb-data:/var/lib/mysql
    networks:
      - internal
    healthcheck:
      # mysqladmin ping ist im Red-Hat-MariaDB-Image enthalten
      test: ["CMD-SHELL",
             "mysqladmin ping -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 10s
      timeout:  5s
      retries:  6
      start_period: 30s
    # Port nicht nach außen exponieren – nur intern erreichbar
    expose:
      - "3306"

  # ── ArborPress (UBI9 Python 3.12) ─────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.mariadb
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # ── Datenbank ──────────────────────────────────────────────────────────
      ARBORPRESS_DB__URL: >-
        mysql+aiomysql://${DB_USER:-arborpress}:${DB_PASSWORD}@db/${DB_NAME:-arborpress}
      # ── Web / Sicherheit ───────────────────────────────────────────────────
      ARBORPRESS_WEB__SECRET_KEY:      "${ARBORPRESS_WEB__SECRET_KEY:?SECRET_KEY muss in .env gesetzt sein}"
      ARBORPRESS_WEB__BASE_URL:        "${ARBORPRESS_WEB__BASE_URL:-http://localhost:8080}"
      ARBORPRESS_WEB__TRUSTED_PROXIES: "${ARBORPRESS_WEB__TRUSTED_PROXIES:-1}"
      # ── Logging (stdout – von Container-Runtime abgefangen) ────────────────
      ARBORPRESS_LOGGING__LEVEL:       "${ARBORPRESS_LOGGING__LEVEL:-INFO}"
      # ── Worker-Anzahl ──────────────────────────────────────────────────────
      ARBORPRESS_WORKERS:              "${ARBORPRESS_WORKERS:-2}"
      # ── Cache (optional: redis) ────────────────────────────────────────────
      # ARBORPRESS_CACHE__BACKEND:    "redis"
      # ARBORPRESS_CACHE__REDIS_URL:  "redis://redis:6379/0"
    volumes:
      - arborpress-media:/opt/app-root/src/media
      - arborpress-logs:/opt/app-root/src/logs
    networks:
      - internal
      - external
    ports:
      - "${APP_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL",
             "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/_health')\""]
      interval: 30s
      timeout:  5s
      retries:  3
      start_period: 30s

# ── Netzwerke ────────────────────────────────────────────────────────────────
networks:
  # Internes Netz: App ↔ Datenbank (kein Außenzugriff)
  internal:
    internal: true
  # Externes Netz: App ↔ Reverse-Proxy / Host
  external: {}

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  mariadb-data:
    driver: local
  arborpress-media:
    driver: local
  arborpress-logs:
    driver: local
