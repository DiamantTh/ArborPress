# Alembic-Konfiguration für ArborPress (§12 DB-Migrationen)
# Dokumentation: https://alembic.sqlalchemy.org/

[alembic]
# Pfad zum Migrations-Skript-Verzeichnis
script_location = alembic

# Template für neue Revision-Dateien
# file_template = %%(rev)s_%%(slug)s

# sys.path-Erweiterung (relativ zur alembic.ini)
# prepend_sys_path = .

# Timezone für revision timestamps
# timezone =

# Truncate slug field
# truncate_slug_length = 40

# Revision-Umgebung
# revision_environment = false

# Sourceless-Modus (keine .pyc)
# sourceless = false

# Versionspfad-Separator (Windows: ;, Unix: :, space: space, newline: newline)
# version_path_separator = os  # Betriebssystemabhängig

# Ausgabeformat für Skript-Encoding
# output_encoding = utf-8

# Database URL – wird in env.py aus config.toml geladen
sqlalchemy.url = postgresql+asyncpg://arborpress:changeme@localhost/arborpress

[post_write_hooks]
# hooks = autopep8
# autopep8.type = console_scripts
# autopep8.entrypoint = autopep8
# autopep8.options = --in-place --select=E501

# Logging-Konfiguration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
